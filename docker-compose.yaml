services:
  db: 
    image: postgres:15
    volumes: 
      - postgres_data:/var/lib/postgresql/data/
      # Posso adicionar volumes pré-preenchidos aqui, se necessário
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

volumes:
  postgres_data: